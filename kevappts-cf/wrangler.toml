name = "kevappts"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
TIMEZONE = "Europe/Malta"
DOCTOR_NAME = "Dr Kevin Navarro Gera"
CLINIC_NAME = "Potter's Pharmacy Clinic"
SPINOLA_LOCATION = "Spinola Clinic"
SPINOLA_DOCTOR_NAME = "Dr James"
SPINOLA_LOCATION_DETAILS = "Near McDonald's, Love Statue, near bus stop, in Spinola"
LINDA_DOCTOR_NAME = "Linda"
LINDA_LOCATION = "Potter's Clinic"

# Secrets (set via `wrangler secret put`):
# SIGNING_SECRET          — HMAC key for cancel/action links (reuse from GAS)
# ADMIN_SECRET            — HMAC key for admin panel (reuse from GAS)
# RESEND_API_KEY          — Resend email API key
# DOCTOR_EMAIL            — Doctor's email for daily schedule
# GOOGLE_CLIENT_ID        — OAuth2 client ID for Calendar API
# GOOGLE_CLIENT_SECRET    — OAuth2 client secret
# GOOGLE_REFRESH_TOKEN    — OAuth2 refresh token (one-time setup)
# GOOGLE_CALENDAR_ID      — Potter's Google Calendar ID
# GOOGLE_SPINOLA_CALENDAR_ID — Spinola Google Calendar ID
# LINDA_CALENDAR_ID       — Linda's (physiotherapy) Google Calendar ID
#   value: a18cc8ed238199dd6f03ca81085c202a5f032850f65782631aed5a3fb5fa431a@group.calendar.google.com

[[d1_databases]]
binding = "DB"
database_name = "kevappts-db"
database_id = "dfd696b3-f6a7-484a-848e-aab1591d9261"

# Durable Objects for real-time WebSockets
[durable_objects]
bindings = [
  { name = "REALTIME", class_name = "RealtimeHub" }
]

[[migrations]]
tag = "v1"
new_classes = ["RealtimeHub"]

# Cron triggers:
# 1. Daily schedule email at 7am Malta time (5am UTC summer)
# 2. Every 10 min — drives appointment reminders + the 2pm Malta follow-up fire
#    (the scheduled() handler gates each job by Malta local time, so DST is handled)
[triggers]
crons = ["0 5 * * *", "*/10 * * * *"]
